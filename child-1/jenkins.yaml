jenkins:
  systemMessage: "Jenkins configured using CasC Child Inheritance"
unclassified:
  buildDiscarders:
    configuredBuildDiscarders:
    - "jobBuildDiscarder"
  cloudBeesSCMReporting:
    enabled: true
  experimentalPlugins:
    enabled: false
  fingerprints:
    fingerprintCleanupDisabled: false
    storage: "file"
  mailer:
    charset: "UTF-8"
    useSsl: false
    useTls: false
  pollSCM:
    pollingThreadCount: 10
  usageStatisticsCloudBees:
    disabledJenkinsUsageStatistics: true
    usageStatisticsCollected: false
globalCloudBeesPipelineTemplateCatalog: 
  catalogs:
  - branchOrTag: "main"
    scm:
      git:
        remote: "https://github.com/Gangwal-Mayank/cbci-casc-bundles.git"
    updateInterval: "1d"
